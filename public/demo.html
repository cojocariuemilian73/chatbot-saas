<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbot Widget — Demo</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 700px; margin: 80px auto; padding: 0 20px; color: #111; }
    h1 { font-size: 2rem; margin-bottom: .5rem; }
    p  { color: #555; line-height: 1.6; }
  </style>
</head>
<body>
  <h1>Cabinet Stomatologic Dr. Ionescu</h1>
  <p>Bine ați venit! Suntem specializați în stomatologie estetică și implantologie.</p>
  <p>Programul de lucru: Luni–Vineri 09:00–18:00 | Sâmbătă 09:00–13:00</p>

  <!--
    Un singur script tag — tot ce aveți nevoie pentru a integra widget-ul.
    data-server  : URL-ul backend-ului (gol dacă e același domeniu)
    data-title   : textul afișat în header-ul ferestrei de chat
    data-theme   : culoarea accentului (albastru medical)
  -->
  <script
    src="/widget.js"
    data-title="Asistent Cabinet Dr. Ionescu"
    data-theme="#0369a1"
    data-placeholder="Scrieți-ne un mesaj…"
  ></script>
</body>
</html>
